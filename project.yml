name: SalaryDance
options:
  bundleIdPrefix: com.salarydance
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  SalaryDance:
    type: application
    platform: macOS
    sources:
      - SalaryDance
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.salarydance.app
        INFOPLIST_FILE: SalaryDance/Info.plist
        CODE_SIGN_ENTITLEMENTS: SalaryDance/SalaryDance.entitlements
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        SWIFT_STRICT_CONCURRENCY: minimal
